    KippoProjectOrganizationCategory:
      type: object
      description: |-
        Read/write serializer for KippoProjectOrganizationCategory.

        Backs both the project category picker (read, kippo#43) and org category management
        (write, kippo#48). Write access is gated by ``IsSuperuserOrOrgMemberForCategory``; this
        serializer additionally (a) runs the model's cross-scope/uniqueness validation so duplicates
        surface as 400s (never a DB IntegrityError 500) and (b) rejects an ``organization`` the
        requester is not a member of (defence-in-depth alongside the permission class).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        key:
          type: string
          title: キー
          maxLength: 32
        label:
          type: string
          title: ラベル
          maxLength: 128
        organization:
          type: string
          format: uuid
          nullable: true
          title: 組織
          description: Organization this category belongs to; leave empty for a global
            default category
        sort_order:
          type: integer
          maximum: 32767
          minimum: 0
          title: 表示順
        is_active:
          type: boolean
          title: 有効
        is_default:
          type: boolean
          title: デフォルト
          description: Auto-selected category for new projects in this organization
            (at most one per organization)
      required:
      - id
      - key
      - label
