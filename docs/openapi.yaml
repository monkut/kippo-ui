  /api/organizations/{id}/:
    get:
      operationId: organizations_retrieve
      description: |-
        Read-only ViewSet for KippoOrganization.

        Exposes the organizations the requester is a member of (superusers see all),
        plus a `members` action that lists active members of a single organization.
        See kippo#14.

        **Endpoints:**
        - `GET /api/organizations/` — list orgs the user belongs to
        - `GET /api/organizations/<id>/members/` — list members of one org

        **Permissions:**
        - Read only: Authenticated users
        - Non-members of `<id>` receive 403 from the `members` action
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this kippo organization.
        required: true
      tags:
      - organizations
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: ''
  /api/organizations/{id}/members/:
    get:
      operationId: organizations_members_retrieve
      description: Active members of the given organization. Excludes the unassigned
        bot user and (by default) KippoUser.is_active=False users. Returns the richer
        per-org shape (adds email and slack_* fields) that the per-project endpoint
        omits. Pass `?month=YYYY-MM-DD` to include each member's `available_work_days`
        for that calendar month — used by the assignments-matrix UI to express row
        totals in person-days instead of percentages.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this kippo organization.
        required: true
      - in: query
        name: include_inactive
        schema:
          type: boolean
        description: Include KippoUser.is_active=False users. Default false.
      - in: query
        name: is_developer
        schema:
          type: boolean
        description: Filter to developers only.
      - in: query
        name: is_project_manager
        schema:
          type: boolean
        description: Filter to project managers only.
      - in: query
        name: month
        schema:
          type: string
        description: When set (YYYY-MM-DD; any day, snapped to month start), each
          member's `available_work_days` field is populated with the count of available
          workdays in that month (committed weekdays minus public/personal holidays).
          Omitted or invalid → `available_work_days` is null.
      tags:
      - organizations
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMembersResponse'
          description: Members of the organization, with per-org Slack and email fields.
        '400':
          description: '`month` query parameter is not in YYYY-MM-DD format.'
        '403':
          description: Requester is not a member of the organization.
        '404':
          description: Organization does not exist.
