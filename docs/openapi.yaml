        user_username:
          type: string
          readOnly: true
        week_start:
          type: string
          format: date
          description: Unlocked Effort Week Start (MONDAY)
        reason:
          type: string
          description: 'アンロック申請理由 (DCAA: 締め後編集には記録された正当な理由が必要)'
        approved_by:
          type: string
          format: uuid
          readOnly: true
          nullable: true
          description: 承認した組織admin (未設定 = 承認待ち)
        approved_by_username:
          type: string
          readOnly: true
          nullable: true
        approved_datetime:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: 承認日時 (未設定 = 承認待ち)
        expires_datetime:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: '再ロック期限: 承認時に設定され、この日時を過ぎると編集不可に戻る'
        is_active:
          type: boolean
          readOnly: true
        created_by:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        created_datetime:
          type: string
          format: date-time
          readOnly: true
        updated_datetime:
          type: string
          format: date-time
          readOnly: true
      required:
      - approved_by
      - approved_by_username
      - approved_datetime
      - created_by
      - created_datetime
      - expires_datetime
      - id
      - is_active
      - organization
      - reason
      - updated_datetime
      - user
      - user_username
      - week_start
    ProjectWeeklyEffortUnlockApproveRequestRequest:
      type: object
      properties:
        expires_datetime:
          type: string
          format: date-time
          description: 再ロック期限 (省略時はデフォルト7日後)
    ProjectWeeklyEffortUnlockRequest:
      type: object
      description: |-
        週間稼働アンロックの申請/承認シリアライザ (kippo#33 / T18).

        Create = 申請: ユーザは `organization` + `week_start` + `reason` を送信する。`user` は申請者本人に固定され、
        承認関連フィールドは read-only。承認は viewset の `approve` アクション (組織admin限定) で行う。
      properties:
        organization:
          type: string
          format: uuid
        week_start:
          type: string
          format: date
          description: Unlocked Effort Week Start (MONDAY)
        reason:
          type: string
          minLength: 1
          description: 'アンロック申請理由 (DCAA: 締め後編集には記録された正当な理由が必要)'
      required:
      - organization
      - reason
      - week_start
    PublicHoliday:
      type: object
      description: |-
        Serializer for PublicHoliday model.

        Returns public holidays for the authenticated user's holiday_country.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          readOnly: true
          description: Holiday Name
        day:
          type: string
          format: date
          readOnly: true
        country_name:
          type: string
          readOnly: true
      required:
      - country_name
      - day
      - id
      - name
    ReviewActionEnum:
      enum:
      - accepted
      - rejected
      - duplicate
      - needs_info
      - issue_created
      type: string
      description: |-
        * `accepted` - accepted
        * `rejected` - rejected
        * `duplicate` - duplicate
        * `needs_info` - needs_info
        * `issue_created` - issue_created
    RoleEnum:
      enum:
      - developer
      - project_manager
      - tester
      type: string
      description: |-
        * `developer` - developer
        * `project_manager` - project_manager
        * `tester` - tester
    ScheduleEstimationRequestRequest:
      type: object
      description: Serializer for schedule estimation request.
      properties:
        project:
          type: string
          format: uuid
          description: Project UUID to schedule requirements for
        developer_count:
          type: integer
          maximum: 100
          minimum: 1
          description: Number of developers available for the work
        start_date:
          type: string
          format: date
          nullable: true
          description: Schedule start date (defaults to today)
      required:
      - developer_count
      - project
    ScheduleEstimationResponse:
      type: object
      description: Serializer for schedule estimation response.
      properties:
        estimated_completion_date:
          type: string
          description: ISO format date when all work is expected to complete
        total_estimate_days:
          type: number
          format: double
          description: Sum of all requirement estimates in days
        total_confidence_adjusted_days:
          type: number
          format: double
          description: Sum of confidence-adjusted estimates
        requirements_count:
          type: integer
          description: Number of requirements scheduled
        schedule_start_date:
          type: string
          description: ISO format date used as scheduling start
        developer_count:
          type: integer
          description: Number of developers used for scheduling
        scheduled_requirements:
          type: array
          items:
            $ref: '#/components/schemas/ScheduledRequirement'
          description: List of scheduled requirements
      required:
      - developer_count
      - estimated_completion_date
      - requirements_count
      - schedule_start_date
      - scheduled_requirements
      - total_confidence_adjusted_days
      - total_estimate_days
    ScheduledRequirement:
      type: object
      description: Serializer for individual scheduled requirement in the response.
      properties:
        id:
          type: integer
          description: Technical requirement database ID
        display_id:
          type: string
          description: Human-readable display ID (e.g., TR-001)
        title:
          type: string
          description: Title of the technical requirement
        category:
          type: string
          description: Category name of the requirement
        estimate_days:
          type: number
          format: double
          description: Original estimate in days
        confidence:
          type: number
          format: double
          description: Confidence level (0.1-1.0)
        confidence_adjusted_days:
          type: number
          format: double
          description: Estimate adjusted by confidence factor
        assigned_developer:
          type: string
          description: Developer assignment identifier (e.g., Developer 1)
        priority:
          type: integer
          description: Scheduling priority (lower = higher priority)
        scheduled_start_date:
          type: string
          nullable: true
          description: ISO format start date (null if unscheduled)
        scheduled_end_date:
          type: string
          nullable: true
          description: ISO format end date (null if unscheduled)
        is_scheduled:
          type: boolean
          description: Whether this requirement was successfully scheduled
      required:
      - assigned_developer
      - category
      - confidence
      - confidence_adjusted_days
      - display_id
      - estimate_days
      - id
      - is_scheduled
      - priority
      - scheduled_end_date
      - scheduled_start_date
      - title
    ServiceEnum:
      enum:
      - AWS
      - AZURE
      - GCP
      - OTHER
      type: string
      description: |-
        * `AWS` - AWS
        * `AZURE` - AZURE
        * `GCP` - GCP
        * `OTHER` - OTHER
    SuggestAssignmentsRequestRequest:
      type: object
      properties:
