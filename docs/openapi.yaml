    PatchedKippoCustomerRequest:
      type: object
      description: |-
        Serializer for KippoCustomer model.

        Changelist-parity read-only additions (kippo#45): ``active_project_count`` (annotated scalar
        Subquery in the viewset), ``active_projects_contract_total`` (Σ active projects' contract totals,
        from the prefetched active-projects set), and ``compliance_verified``.
      properties:
        organization:
          type: string
          format: uuid
          title: 組織
        name:
          type: string
          minLength: 1
          title: 顧客名
          maxLength: 256
        email:
          type: string
          format: email
          title: メールアドレス
          maxLength: 254
        phone:
          type: string
          title: 電話番号
          maxLength: 50
        website:
          type: string
          format: uri
          title: ウェブサイト
          maxLength: 200
        document_url:
          type: string
          format: uri
          title: ドキュメントURL
          description: Link to customer-related documents (folder, drive, wiki, etc.)
          maxLength: 200
        contract_folder_url:
          type: string
          format: uri
          title: 契約フォルダURL
          description: Link to the customer's contract documents folder (drive, etc.)
          maxLength: 200
        notes:
          type: string
          title: メモ
    PatchedKippoProjectBillingEntryRequest:
