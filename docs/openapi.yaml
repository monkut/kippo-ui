        set from the nested route.
      properties:
        billing_date:
          type: string
          format: date
          title: 請求日
          description: Date the entry is billed/recognized. Monthly-generated entries
            use the month-end (月末) date.
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,0})?$
          title: 金額
          description: Billed amount (JPY).
        is_manual:
          type: boolean
          title: 手動追加
          description: True for hand-added entries; False for entries generated from
            the contract terms.
        is_received:
          type: boolean
          title: 入金済
          description: True once payment for this billing entry has been received.
        note:
          type: string
          title: 備考
          maxLength: 255
    PatchedKippoProjectContractRequest:
      type: object
      description: The project's contract (kippo#31) — billing terms. project is set
        from the nested route.
      properties:
        billing_type:
          allOf:
          - $ref: '#/components/schemas/BillingTypeEnum'
          title: 請求方法
          description: |-
            When revenue is billed: 'delivery' (納品, once at the contract end_date) or 'monthly' (月額, each month-end across the contract period).

            * `delivery` - 納品
            * `monthly` - 月額
        pricing_basis:
          allOf:
          - $ref: '#/components/schemas/PricingBasisEnum'
          title: 料金体系
          description: |-
            How each billed amount is computed: 'fixed' (固定, the contract total_amount) or 'effort' (実績, actual logged effort × role rate — time-&-materials). When 'effort', total_amount is an optional cap (上限) and may be left blank.

            * `fixed` - 固定
            * `effort` - 実績
        total_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,0})?$
          nullable: true
          title: 契約金額
          description: JPY. Contract total for 'fixed' pricing (required; for 'monthly'
            it is split evenly across the contract months with the remainder on the
            final month). For 'effort' pricing it is an optional cap (上限) and may
            be left blank.
        estimated_monthly_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,0})?$
          nullable: true
          title: 月額
          description: 'JPY. Provisional (仮) monthly amount for effort + monthly contracts
            (kippo#46): every contract month is billed this amount up front, then
            corrected to actuals (実績) via the true-up admin action before the entry
            is received. Blank bills logged actuals directly.'
        start_date:
          type: string
          format: date
          nullable: true
          title: 契約開始日
          description: Contract period start. Auto-populated from the project start_date
            when left blank.
        end_date:
          type: string
          format: date
          nullable: true
          title: 契約終了日
          description: Contract period end. Auto-populated from the project target_date
            when left blank.
        note:
          type: string
          title: 備考
          maxLength: 255
    PatchedKippoProjectOrganizationCategoryRequest:
      type: object
      description: |-
        Read/write serializer for KippoProjectOrganizationCategory.

        Backs both the project category picker (read, kippo#43) and org category management
        (write, kippo#48). Write access is gated by ``IsSuperuserOrOrgMemberForCategory``; this
        serializer additionally (a) runs the model's cross-scope/uniqueness validation so duplicates
