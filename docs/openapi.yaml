  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Returns the currently authenticated user's information. Works with
        both session and JWT auth.
      summary: Get current user
      tags:
      - auth
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  username:
                    type: string
                  email:
                    type: string
                  first_name:
                    type: string
                  last_name:
                    type: string
                  is_staff:
                    type: boolean
          description: ''
  /api/customers/:
    get:
      operationId: customers_list
      description: |-
        ViewSet for KippoCustomer model.

        **Organization Scoping:**
        - Regular users see only customers from organizations they belong to.
        - Superusers see all customers.

        **Filtering:**
        - organization: UUID filter (still intersected with user's memberships).
        - recent_ending: when ``true``, only customers with 1+ project whose ``target_date`` falls in the
          last two fiscal years (previous + current FY) of the customer's organization.
        - search: SearchFilter on `name`, `email`.

        **Permissions:**
        - Read (GET): Authenticated users (organization-scoped for regular users).
        - Create (POST): Authenticated users (organization-membership enforced by serializer).
        - Update (PUT/PATCH): Authenticated users (organization-scoped).
        - Delete (DELETE): Superusers only.
      parameters:
      - in: query
        name: organization
        schema:
          type: string
        description: Filter by organization UUID
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: recent_ending
        schema:
          type: boolean
        description: When true, only customers with 1+ project ending in the previous
          or current fiscal year.
      - in: query
        name: search
        schema:
          type: string
        description: Search on name, email
      tags:
      - customers
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedKippoCustomerList'
          description: ''
    post:
      operationId: customers_create
      description: |-
        ViewSet for KippoCustomer model.

        **Organization Scoping:**
        - Regular users see only customers from organizations they belong to.
        - Superusers see all customers.

        **Filtering:**
        - organization: UUID filter (still intersected with user's memberships).
        - recent_ending: when ``true``, only customers with 1+ project whose ``target_date`` falls in the
          last two fiscal years (previous + current FY) of the customer's organization.
        - search: SearchFilter on `name`, `email`.

        **Permissions:**
        - Read (GET): Authenticated users (organization-scoped for regular users).
        - Create (POST): Authenticated users (organization-membership enforced by serializer).
        - Update (PUT/PATCH): Authenticated users (organization-scoped).
        - Delete (DELETE): Superusers only.
      tags:
      - customers
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KippoCustomerRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/KippoCustomerRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/KippoCustomerRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
