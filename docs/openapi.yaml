  /api/monthly-assignments/:
    get:
      operationId: monthly_assignments_list
      description: |-
        ViewSet for ProjectMonthlyAssignment model.

        Manages monthly workload percentage assignments for users on projects.

        **Organization Scoping:**
        - Regular users can only access assignments for projects in organizations they belong to
        - Superusers can access assignments from all organizations

        **Filtering:**
        - project: Filter by project UUID
        - user: Filter by user ID
        - month: Filter by exact month (YYYY-MM-DD format, day should be 01). Defaults to the
          current month (JST) when none of month/month_gte/month_lte is supplied.
        - month_gte: Filter by month >= date (YYYY-MM-DD format)
        - month_lte: Filter by month <= date (YYYY-MM-DD format)

        **Validation:**
        - User must be a member of the project's organization
        - Month defaults to the project's start_date month if not provided
        - A warning is logged if total assignment percentage for a user exceeds 100% in an organization

        **Permissions:**
        - All CRUD operations require authentication
        - Users can only manage assignments for projects in their organizations
      parameters:
      - in: query
        name: month
        schema:
          type: string
        description: Filter by exact month (YYYY-MM-DD format). When omitted (and
          no month_gte/month_lte), defaults to the current month in JST.
      - in: query
        name: month_gte
        schema:
          type: string
        description: Filter by month >= date (YYYY-MM-DD format)
      - in: query
        name: month_lte
        schema:
          type: string
        description: Filter by month <= date (YYYY-MM-DD format)
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: project
        schema:
          type: string
        description: Filter by project UUID
      - in: query
        name: user
        schema:
          type: integer
        description: Filter by user ID
      tags:
      - monthly-assignments
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjectMonthlyAssignmentList'
          description: ''
    post:
      operationId: monthly_assignments_create
      description: |-
        ViewSet for ProjectMonthlyAssignment model.

        Manages monthly workload percentage assignments for users on projects.

        **Organization Scoping:**
        - Regular users can only access assignments for projects in organizations they belong to
        - Superusers can access assignments from all organizations

        **Filtering:**
        - project: Filter by project UUID
        - user: Filter by user ID
        - month: Filter by exact month (YYYY-MM-DD format, day should be 01). Defaults to the
          current month (JST) when none of month/month_gte/month_lte is supplied.
        - month_gte: Filter by month >= date (YYYY-MM-DD format)
        - month_lte: Filter by month <= date (YYYY-MM-DD format)

        **Validation:**
        - User must be a member of the project's organization
        - Month defaults to the project's start_date month if not provided
        - A warning is logged if total assignment percentage for a user exceeds 100% in an organization

        **Permissions:**
        - All CRUD operations require authentication
        - Users can only manage assignments for projects in their organizations
      tags:
      - monthly-assignments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectMonthlyAssignmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectMonthlyAssignmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectMonthlyAssignmentRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMonthlyAssignment'
          description: ''
