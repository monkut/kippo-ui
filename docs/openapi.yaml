    KippoProjectBillingEntry:
      type: object
      description: One entry in a contract's billing ledger (kippo#31). contract is
        set from the nested route.
      properties:
        id:
          type: integer
          readOnly: true
        contract:
          type: integer
          readOnly: true
          description: Contract this billing entry belongs to.
        billing_date:
          type: string
          format: date
          title: 請求日
          description: Date the entry is billed/recognized. Monthly-generated entries
            use the month-end (月末) date.
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,0})?$
          title: 金額
          description: Billed amount (JPY).
        is_manual:
          type: boolean
          title: 手動追加
          description: True for hand-added entries; False for entries generated from
            the contract terms.
        is_received:
          type: boolean
          title: 入金済
          description: True once payment for this billing entry has been received.
        received_datetime:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          title: 入金日時
          description: When payment was received. Auto-set when is_received is enabled;
            cleared when disabled.
        received_by:
          type: string
          format: uuid
          readOnly: true
          nullable: true
          title: 入金確認者
          description: User who verified/received the payment. Stamped from the acting
            admin when is_received is set; cleared when disabled.
        note:
          type: string
          title: 備考
          maxLength: 255
        created_datetime:
          type: string
          format: date-time
          readOnly: true
        updated_datetime:
          type: string
          format: date-time
          readOnly: true
      required:
      - amount
      - billing_date
      - contract
      - created_datetime
      - id
      - received_by
      - received_datetime
      - updated_datetime
