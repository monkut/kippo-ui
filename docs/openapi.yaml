      - github_organization_name
      - id
      - name
    OrganizationListResponse:
      type: object
      properties:
        organizations:
          type: array
          items:
            $ref: '#/components/schemas/Organization'
      required:
      - organizations
    OrganizationMember:
      type: object
      description: |-
        Minimal projection of a `KippoUser` + their `OrganizationMembership` for use as a
        user-picker source on the kippo-ui add-assignment modal (kippo-ui#57). Per kippo#233.
      properties:
        user_id:
          type: string
          format: uuid
          description: KippoUser primary key.
        username:
          type: string
        display_name:
          type: string
          description: Composed first + last + (github_login).
        github_login:
          type: string
        is_developer:
          type: boolean
        is_project_manager:
          type: boolean
      required:
      - display_name
      - github_login
      - is_developer
      - is_project_manager
      - user_id
      - username
    OrganizationMemberDetail:
      type: object
      description: |-
        Org-scoped projection of `KippoUser` joined with their `OrganizationMembership`.

        Returned by `GET /api/organizations/<id>/members/`. Adds the per-org PII
        (`email`, `slack_*`) that `projects.serializers.OrganizationMemberSerializer`
        intentionally omits — keep these two serializers separate so the per-project
        contract consumed by kippo-ui#57 is not coupled to this richer shape. Per kippo#14.
      properties:
        user_id:
          type: string
          format: uuid
          description: KippoUser primary key.
        username:
          type: string
        display_name:
          type: string
          description: Composed first + last + (github_login).
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          description: Per-org email from OrganizationMembership, not KippoUser.
        github_login:
          type: string
        is_developer:
          type: boolean
        is_project_manager:
          type: boolean
        slack_username:
          type: string
        slack_user_id:
          type: string
        slack_image_url:
          type: string
        available_work_days:
          type: integer
          nullable: true
          description: Workdays this member is available in the calendar month requested
            via the `month` query parameter (committed weekdays minus public/personal
            holidays). Null/absent when `month` is not provided.
      required:
      - display_name
      - email
      - first_name
      - github_login
      - is_developer
      - is_project_manager
      - last_name
      - slack_image_url
      - slack_user_id
      - slack_username
      - user_id
      - username
    OrganizationMembersResponse:
      type: object
      properties:
        members:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationMemberDetail'
      required:
      - members
