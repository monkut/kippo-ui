          description: Strategy keys that produced this pattern (one entry, or several
            after dedup).
        label:
          type: string
          description: Human-readable label derived from pattern_ids.
        estimated_completion:
          type: string
          format: date
          nullable: true
          description: Day-precision completion date; null when the pattern can't
            reach the allocated effort.
        infeasible:
          type: boolean
          description: True when the pattern overshoots target_date or breaches the
            per-user 100% cap.
        conflicts:
          type: array
          items:
            $ref: '#/components/schemas/ProjectAssignmentPatternConflict'
        members:
          type: array
          items:
            $ref: '#/components/schemas/ProjectAssignmentPatternMember'
      required:
      - conflicts
      - estimated_completion
      - infeasible
      - label
      - members
      - pattern_ids
