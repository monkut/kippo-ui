openapi: 3.0.3
info:
  title: Kippo Project Management API
  version: 1.1.0
  description: REST API for managing Kippo projects, tasks, and effort tracking
paths:
  /api/assignment-rates/:
    get:
      operationId: assignment_rates_list
      description: |-
        ViewSet for ProjectAssignmentRate model.

        Manages daily rates per role for projects.

        **Organization Scoping:**
        - Regular users can only access assignment rates for projects in organizations they belong to
        - Superusers can access assignment rates from all organizations

        **Filtering:**
        - project: Filter by project UUID

        **Permissions:**
        - All CRUD operations require authentication
        - Users can only manage rates for projects in their organizations
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: project
        schema:
          type: string
        description: Filter by project UUID
      tags:
      - assignment-rates
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjectAssignmentRateList'
          description: ''
    post:
      operationId: assignment_rates_create
      description: |-
        ViewSet for ProjectAssignmentRate model.

        Manages daily rates per role for projects.

        **Organization Scoping:**
        - Regular users can only access assignment rates for projects in organizations they belong to
        - Superusers can access assignment rates from all organizations

        **Filtering:**
        - project: Filter by project UUID

        **Permissions:**
        - All CRUD operations require authentication
        - Users can only manage rates for projects in their organizations
      tags:
      - assignment-rates
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectAssignmentRateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectAssignmentRateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectAssignmentRateRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectAssignmentRate'
          description: ''
