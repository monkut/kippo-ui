name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    # Pin to ubuntu-22.04 instead of ubuntu-latest. The 24.04 runner image
    # (currently `ubuntu-latest`) lost its pre-cached Playwright browser
    # binary at some point on 2026-05-28 and `pnpm exec playwright install`
    # hung 30+ min downloading from Playwright's CDN on multiple consecutive
    # runs (26557349952, 26559612601). 22.04 reproduces the prior fast
    # behavior; revisit once 24.04 settles.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update API client from latest kippo release
        run: pnpm update:api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run type check
        run: pnpm typecheck

      # Cache the Playwright browser binary so we don't depend on whether
      # the runner image happens to ship one. Key on pnpm-lock.yaml so a
      # Playwright bump invalidates the cache automatically.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        # Drop --with-deps: the runner already ships Chromium's system libs.
        # timeout-minutes is the hard guard against the 30+ min hangs we hit
        # on 2026-05-28 (runs 26557349952, 26559612601) before this PR; a
        # legitimate install should finish in well under a minute.
        if: steps.pw-cache.outputs.cache-hit != 'true'
        timeout-minutes: 5
        run: pnpm exec playwright install chromium

      - name: Run tests
        run: pnpm test

      - name: Run format check
        run: pnpm format:check

      - name: Build per-stage tarballs
        run: |
          set -euo pipefail
          for prefix in "" "/dev" "/stg" "/prod"; do
            rm -rf build
            VITE_URL_PREFIX="$prefix" pnpm build
            if [ -z "$prefix" ]; then
              tarball="kippo-ui-build.tar.gz"
            else
              tarball="kippo-ui-build-${prefix#/}.tar.gz"
            fi
            ( cd build/client && tar -czvf "../../${tarball}" . )
          done

      - name: Generate version tag
        id: version
        run: echo "version=v$(date +'%Y%m%d_%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }} (${{ github.sha }})
          generate_release_notes: true
          files: |
            kippo-ui-build.tar.gz
            kippo-ui-build-dev.tar.gz
            kippo-ui-build-stg.tar.gz
            kippo-ui-build-prod.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: kippo-ui-build
          path: build/
          retention-days: 30
