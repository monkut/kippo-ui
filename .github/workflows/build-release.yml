name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update API client from latest kippo release
        run: pnpm update:api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run type check
        run: pnpm typecheck

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run tests
        run: pnpm test

      - name: Run format check
        run: pnpm format:check

      - name: Build per-stage tarballs
        run: |
          set -euo pipefail
          for prefix in "" "/dev" "/stg" "/prod"; do
            rm -rf build
            VITE_URL_PREFIX="$prefix" pnpm build
            if [ -z "$prefix" ]; then
              tarball="kippo-ui-build.tar.gz"
            else
              tarball="kippo-ui-build-${prefix#/}.tar.gz"
            fi
            ( cd build/client && tar -czvf "../../${tarball}" . )
          done

      - name: Generate version tag
        id: version
        run: echo "version=v$(date +'%Y%m%d_%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }} (${{ github.sha }})
          generate_release_notes: true
          files: |
            kippo-ui-build.tar.gz
            kippo-ui-build-dev.tar.gz
            kippo-ui-build-stg.tar.gz
            kippo-ui-build-prod.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: kippo-ui-build
          path: build/
          retention-days: 30
